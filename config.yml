  author: Vishal Sharma

  DateFormat: "Jan 2006"
  defaultTheme: dark
  hideFooter: false
  disableThemeToggle: false

  ShowShareButtons: false
  ShowReadingTime: true
  disableSpecial1stPost: true
  disableAnchoredHeadings: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowAllPagesInArchive: false
  MainSections: ["projects", "thinking", "notes"]
  ShowToc: true
  TocOpen: false
  ShowWordCount: false
  UseHugoToc: true
  comments: false
  math: true

  profileMode:
    enabled: true
    title: Vishal Sharma
    subtitle: |
      🔋 Battery Simulation Engineer | 🧠 AI Systems Builder  

      Physics-first thinker working on electrochemical models,  
      system-level simulation, and AI-assisted engineering tools.

    imageUrl: "picture.jpg"
    imageWidth: 160
    imageHeight: 160

    buttons:
      - name: Work
        url: projects/

      - name: How I Think
        url: thinking/how-i-think/

      - name: Ideas
        url: ideas/

      - name: Experience
        url: experience/

  socialIcons:
    - name: Email
      url: mailto:writetovishal.sharma@gmail.com

    - name: GitHub
      url: https://github.com/ash3spho3nix

    - name: LinkedIn
      url: https://www.linkedin.com/in/vishal-sharma-54261a18/

    - name: CV
      url: cv.pdf

