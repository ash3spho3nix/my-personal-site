taxonomies:
  tag: tags

menu:
  main:
    - name: About
      url: about/
      weight: 1

    - name: Work
      url: projects/
      weight: 2

    - name: Thinking
      url: thinking/
      weight: 3

    - name: Ideas
      url: ideas/
      weight: 4

    - name: Notes
