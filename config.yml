baseURL: "https://vishal-sharma2409.netlify.app/"
title: Vishal Sharma
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true

pagination:
  pagerSize: 20

taxonomies:
  tag: tags

menu:
  main:
    - name: About
      url: /about/
      weight: 1

    - name: Work
      url: /work/
      weight: 2

    - name: Thinking
      url: /thinking/
      weight: 3

    - name: Notes
      url: /notes/
      weight: 4

