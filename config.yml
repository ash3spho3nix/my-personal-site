params:
  description: "Battery systems specialist with expertise in simulation & modeling, working on electrochemical modeling, system-level simulation, and AI-assisted engineering systems."
  author: Vishal Sharma

  DateFormat: "Jan 2006"
  defaultTheme: dark
  hideFooter: false
  disableThemeToggle: false

  ShowShareButtons: false
  ShowReadingTime: true
  disableSpecial1stPost: true
  disableAnchoredHeadings: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowAllPagesInArchive: false
  MainSections: ["work", "thinking", "notes"]
  ShowToc: true
  TocOpen: false
  ShowWordCount: false
  UseHugoToc: true
  comments: false
  math: true

  profileMode:
    enabled: true
    title: Vishal Sharma
    subtitle: |
      🔋 Battery Systems Specialist | 🧠 AI Systems Builder | Equations builder

      Physics-first thinker working on electrochemical models,
      system-level simulation, and AI-assisted engineering tools.

    imageUrl: "picture.png"
    imageWidth: 160
    imageHeight: 160

    buttons:
      - name: Work & Projects
        url: /work/

      - name: Thinking
        url: /thinking/how-i-think/

      - name: Ideas
        url: /thinking/ideas/

  socialIcons:
    - name: Email
      url: mailto:writetovishal.sharma@gmail.com

    - name: GitHub
      url: https://github.com/ash3spho3nix

    - name: LinkedIn
      url: https://www.linkedin.com/in/vishal-sharma-54261a18/

